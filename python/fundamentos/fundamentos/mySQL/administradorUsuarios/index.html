<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <main>
        <section>
            <h1>Inicio de sesion</h1>
            <form action="">
                <div class="arreglo"><label for="email">E-mail</label><input id="email" type="text"></div>
                <div class="arreglo"><label for="contrasenaLog">Contraseña</label><input id="contrasenaLog" type="text"></div>
            </form>
            <button>Iniciar Sesion</button>
        </section>
        <section>
            <h1>Registro</h1>
            <form action="">
                <div class="arreglo"><label for="nombre">Nombre</label><input id="nombre" type="text"></div>
                <div class="arreglo"><label for="emailReg">E-mail</label><input id="emailReg" type="text"></div>
                <div class="arreglo"><label for="contrasenaReg">Contraseña</label><input id="contrasenaReg" type="text"></div>
                <div class="arreglo"><label for="confContrasenaReg">Confirmar contraseña</label><input id="confContrasenaReg" type="text"></div>
            </form>
            <button>Registro</button>
        </section>
    </main>
</body>
</html>
